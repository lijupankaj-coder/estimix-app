server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /admin.html {
        auth_basic "Nebulix Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
}
